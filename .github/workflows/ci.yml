name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Rust tests
        run: cargo test --workspace --all-targets

      - name: Rust tests with Zig FFI
        run: cargo test -p delarocha --features "zig-ffi"

      - name: Compile Yokohama text benchmark
        run: cargo test -p delarocha --features "zig-ffi vibrato-bench" --example yokohama_text_bench --no-run

      - name: Zig tests
        working-directory: zig
        run: zig build test
